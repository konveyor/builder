name: 'UBI 9 multi-arch go.dev image build'
 
on:
  workflow_dispatch:
    inputs:
      go_version:
        description: 'Go version to build'
        required: true
        default: '1.20.3'
  push:
    paths:
      - 'go.dev.Dockerfile.ubi9'
      - '.github/workflows/ubi9_multi_arch_image_build_godev.yml'
  pull_request:
    paths:
      - 'go.dev.Dockerfile.ubi9'
      - '.github/workflows/ubi9_multi_arch_image_build_godev.yml'
jobs:
  build:
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/ppc64le
          - linux/s390x
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: add checkout action...
        uses: actions/checkout@v6

      - name: configure QEMU action...
        if: matrix.platform == 'linux/ppc64le' || matrix.platform == 'linux/s390x'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.platform }}

      - name: configure Docker Buildx...
        id: docker_buildx
        uses: docker/setup-buildx-action@v4

      - name: login to Quay.io...
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_PUBLISH_ROBOT }}
          password: ${{ secrets.QUAY_PUBLISH_TOKEN }}

      - name: defining go version to use based on input
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "GO_VERSION=${{ github.event.inputs.go_version }}" >> $GITHUB_ENV

      - name: defining go version to use if no input
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "GO_VERSION=1.20.3" >> $GITHUB_ENV

      - name: build image and push by digest...
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./go.dev.Dockerfile.ubi9
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=quay.io/konveyor/builder,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=ubi9-godev-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=ubi9-godev-${{ env.PLATFORM_PAIR }}
          provenance: false
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}

      - name: export digest...
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: upload digest...
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: read
    steps:
      - name: defining go version to use based on input
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "GO_VERSION=${{ github.event.inputs.go_version }}" >> $GITHUB_ENV

      - name: defining go version to use if no input
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "GO_VERSION=1.20.3" >> $GITHUB_ENV

      - name: download digests...
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: login to Quay.io...
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_PUBLISH_ROBOT }}
          password: ${{ secrets.QUAY_PUBLISH_TOKEN }}

      - name: configure Docker Buildx...
        uses: docker/setup-buildx-action@v4

      - name: create and push multi-arch manifest...
        run: |
          docker buildx imagetools create \
            ${{ github.event_name == 'pull_request' && '--dry-run' || '' }} \
            -t quay.io/konveyor/builder:ubi9-godev${{ env.GO_VERSION }}-latest \
            $(printf 'quay.io/konveyor/builder@sha256:%s ' $(ls /tmp/digests))

      - name: get go version
        if: github.event_name != 'pull_request'
        id: go_version_patch
        run: |
          echo "patch_version=$(docker run --rm quay.io/konveyor/builder:ubi9-godev${{ env.GO_VERSION }}-latest go version | awk '{ print $3 }' | sed -e 's/^go//')" >> $GITHUB_ENV

      - name: get go version
        if: github.event_name != 'pull_request'
        id: go_version_minor
        run: |
          echo "minor_version=$(docker run --rm quay.io/konveyor/builder:ubi9-godev${{ env.GO_VERSION }}-latest go version | awk '{ print $3 }' | sed -e 's/^go//' | awk -F '.' '{ print $1 "." $2}')" >> $GITHUB_ENV

      - name: create and push versioned multi-arch manifest...
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create \
            -t quay.io/konveyor/builder:ubi9-godev-v${{ env.minor_version }} \
            -t quay.io/konveyor/builder:ubi9-godev-v${{ env.patch_version }} \
            $(printf 'quay.io/konveyor/builder@sha256:%s ' $(ls /tmp/digests))
