name: 'UBI 10 multi-arch image build'

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: 'Go version to build in format X.Y.Z'
        required: false
        default: ''
  push:
    paths:
      - 'Dockerfile.ubi10'
      - '.github/workflows/ubi10_multi_arch_image_build.yml'
  schedule:
    - cron: '0 0 * * 6'
  pull_request:
    paths:
      - 'Dockerfile.ubi10'
      - '.github/workflows/ubi10_multi_arch_image_build.yml'
jobs:
  determine-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine Go versions to build
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            # On schedule and pull_request, build latest (empty) plus all previous supported Go versions.
            # Go supports two major releases at a time. The go.dev API returns one entry
            # per supported release. The empty string builds the absolute latest via the
            # Dockerfile, so we only need to add the previous supported version(s).
            prev_versions=$(curl -sfS --retry 3 --retry-delay 5 --max-time 30 'https://go.dev/dl/?mode=json' | jq -c '[.[1:][].version | ltrimstr("go")]')
            matrix=$(echo "$prev_versions" | jq -c '{go_version: ([""] + .)}')
          else
            # For workflow_dispatch or push use the provided input (or empty)
            input_version="${{ github.event.inputs.go_version }}"
            matrix=$(jq -nc --arg v "$input_version" '{go_version: [$v]}')
          fi
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build:
    needs: determine-versions
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        go_version: ${{ fromJson(needs.determine-versions.outputs.matrix).go_version }}
        platform:
          - linux/amd64
          - linux/arm64
          - linux/ppc64le
          - linux/s390x
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          go_ver="${{ matrix.go_version }}"
          echo "GO_VERSION_SAFE=${go_ver:-latest}" >> $GITHUB_ENV

      - name: add checkout action...
        uses: actions/checkout@v6

      - name: configure QEMU action...
        if: matrix.platform == 'linux/ppc64le' || matrix.platform == 'linux/s390x'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.platform }}

      - name: configure Docker Buildx...
        id: docker_buildx
        uses: docker/setup-buildx-action@v4

      - name: login to Quay.io...
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_PUBLISH_ROBOT }}
          password: ${{ secrets.QUAY_PUBLISH_TOKEN }}

      - name: build image and push by digest...
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.ubi10
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=quay.io/konveyor/builder,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=ubi10-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=ubi10-${{ env.PLATFORM_PAIR }}
          provenance: false
          build-args: |
            GO_VERSION=go${{ matrix.go_version }}

      - name: export digest...
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: upload digest...
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}-${{ env.GO_VERSION_SAFE }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [determine-versions, build]
    permissions:
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-versions.outputs.matrix) }}
    steps:
      - name: Prepare
        run: |
          go_ver="${{ matrix.go_version }}"
          echo "GO_VERSION_SAFE=${go_ver:-latest}" >> $GITHUB_ENV

      - name: download digests...
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*-${{ env.GO_VERSION_SAFE }}
          merge-multiple: true

      - name: login to Quay.io...
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_PUBLISH_ROBOT }}
          password: ${{ secrets.QUAY_PUBLISH_TOKEN }}

      - name: configure Docker Buildx...
        uses: docker/setup-buildx-action@v4

      - name: create and push multi-arch manifest...
        run: |
          docker buildx imagetools create \
            ${{ github.event_name == 'pull_request' && '--dry-run' || '' }} \
            -t quay.io/konveyor/builder:ubi10-latest${{ matrix.go_version }} \
            $(printf 'quay.io/konveyor/builder@sha256:%s ' $(ls /tmp/digests))

      - name: get go version
        if: github.event_name != 'pull_request'
        id: go_version_patch
        run: |
          echo "patch_version=$(docker run --rm quay.io/konveyor/builder:ubi10-latest${{ matrix.go_version }} go version | awk '{ print $3 }' | sed -e 's/^go//')" >> $GITHUB_ENV

      - name: get go version
        if: github.event_name != 'pull_request'
        id: go_version_minor
        run: |
          echo "minor_version=$(docker run --rm quay.io/konveyor/builder:ubi10-latest${{ matrix.go_version }} go version | awk '{ print $3 }' | sed -e 's/^go//' | awk -F '.' '{ print $1 "." $2}')" >> $GITHUB_ENV

      - name: create and push versioned multi-arch manifest...
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create \
            -t quay.io/konveyor/builder:ubi10-v${{ env.minor_version }} \
            -t quay.io/konveyor/builder:ubi10-v${{ env.patch_version }} \
            $(printf 'quay.io/konveyor/builder@sha256:%s ' $(ls /tmp/digests))
