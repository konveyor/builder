name: 'UBI 10 multi-arch image build'

on:
  workflow_dispatch:
    inputs:
      go_version:
        description: 'Go version to build in format X.Y.Z'
        required: false
        default: ''
  push:
    paths:
      - 'Dockerfile.ubi10'
      - '.github/workflows/ubi10_multi_arch_image_build.yml'
  schedule:
    - cron: '0 0 * * 6'
  pull_request:
    paths:
      - 'Dockerfile.ubi10'
      - '.github/workflows/ubi10_multi_arch_image_build.yml'
jobs:
  determine-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine Go versions to build
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            # On schedule and pull_request, build latest (empty) plus all previous supported Go versions.
            # Go supports two major releases at a time. The go.dev API returns one entry
            # per supported release. The empty string builds the absolute latest via the
            # Dockerfile, so we only need to add the previous supported version(s).
            prev_versions=$(curl -sfS --retry 3 --retry-delay 5 --max-time 30 'https://go.dev/dl/?mode=json' | jq -c '[.[1:][].version | ltrimstr("go")]')
            matrix=$(echo "$prev_versions" | jq -c '{go_version: ([""] + .)}')
          else
            # For workflow_dispatch or push use the provided input (or empty)
            input_version="${{ github.event.inputs.go_version }}"
            matrix=$(jq -nc --arg v "$input_version" '{go_version: [$v]}')
          fi
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  multiarch-build:
    needs: determine-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-versions.outputs.matrix) }}
    steps:
      - name: add checkout action...
        uses: actions/checkout@v6

      - name: configure QEMU action...
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: configure Docker Buildx...
        id: docker_buildx
        uses: docker/setup-buildx-action@v4

      - name: login to Quay.io...
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_PUBLISH_ROBOT }}
          password: ${{ secrets.QUAY_PUBLISH_TOKEN }}

      - name: build Multi-arch images...
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.docker_buildx.outputs.name }}
          context: .
          file: ./Dockerfile.ubi10
          platforms: linux/amd64,linux/ppc64le,linux/arm64,linux/s390x
          push: ${{ github.event_name != 'pull_request' }}
          tags: quay.io/konveyor/builder:ubi10-latest${{ matrix.go_version }}
          cache-to: type=local,dest=/tmp/.buildx-cache
          provenance: false
          build-args: |
            GO_VERSION=go${{ matrix.go_version }}
      - name: get go version
        if: github.event_name != 'pull_request'
        id: go_version_patch
        run: |
          echo "patch_version=$(docker run --rm quay.io/konveyor/builder:ubi10-latest${{ matrix.go_version }} go version | awk '{ print $3 }' | sed -e 's/^go//')" >> $GITHUB_ENV
      - name: get go version
        if: github.event_name != 'pull_request'
        id: go_version_minor
        run: |
          echo "minor_version=$(docker run --rm quay.io/konveyor/builder:ubi10-latest${{ matrix.go_version }} go version | awk '{ print $3 }' | sed -e 's/^go//' | awk -F '.' '{ print $1 "." $2}')" >> $GITHUB_ENV
      - name: reuse cache to push tagged Multi-arch images...
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.docker_buildx.outputs.name }}
          context: .
          file: ./Dockerfile.ubi10
          platforms: linux/amd64,linux/ppc64le,linux/arm64,linux/s390x
          push: true
          tags: quay.io/konveyor/builder:ubi10-v${{ env.minor_version }},quay.io/konveyor/builder:ubi10-v${{ env.patch_version }}
          cache-from: type=local,src=/tmp/.buildx-cache
          provenance: false
          build-args: |
            GO_VERSION=go${{ matrix.go_version }}
